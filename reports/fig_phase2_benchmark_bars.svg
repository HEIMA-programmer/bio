<svg width="680" height="360" viewBox="0 0 680 360" role="img" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', Roboto, Arial, sans-serif">
<title>整合指标对比（示意）</title>
<desc>三种嵌入 X_pca / scVI / scAtlasVAE 在 批次校正、生物保留、总分 三类指标上的对比条形图。数值为示意占位。</desc>
<rect x="0" y="0" width="680" height="360" fill="#ffffff"/>
<text x="340" y="26" text-anchor="middle" font-size="15" font-weight="600" fill="#1f2328">整合指标对比（示意，数值为占位，待实跑替换）</text>

<!-- Y 轴与网格 (0 / 0.5 / 1.0)，基线 y=290，1.0 对应 y=70 -->
<line x1="70" y1="70" x2="640" y2="70" stroke="#eaeef2"/>
<line x1="70" y1="180" x2="640" y2="180" stroke="#eaeef2"/>
<line x1="70" y1="290" x2="640" y2="290" stroke="#d0d7de"/>
<text x="60" y="74" text-anchor="end" font-size="11" fill="#8b949e">1.0</text>
<text x="60" y="184" text-anchor="end" font-size="11" fill="#8b949e">0.5</text>
<text x="60" y="294" text-anchor="end" font-size="11" fill="#8b949e">0</text>

<!-- 组1 批次校正: PCA .55 scVI .88 scAtlasVAE .89  (高度=值*220) -->
<rect x="120" y="169" width="30" height="121" fill="#8b949e"/>
<rect x="154" y="96"  width="30" height="194" fill="#2f6feb"/>
<rect x="188" y="94"  width="30" height="196" fill="#2ea043"/>
<text x="169" y="312" text-anchor="middle" font-size="12" fill="#1f2328">批次校正</text>

<!-- 组2 生物保留: .80 .78 .82 -->
<rect x="300" y="114" width="30" height="176" fill="#8b949e"/>
<rect x="334" y="118" width="30" height="172" fill="#2f6feb"/>
<rect x="368" y="110" width="30" height="180" fill="#2ea043"/>
<text x="349" y="312" text-anchor="middle" font-size="12" fill="#1f2328">生物保留</text>

<!-- 组3 总分: .68 .83 .86 -->
<rect x="480" y="140" width="30" height="150" fill="#8b949e"/>
<rect x="514" y="107" width="30" height="183" fill="#2f6feb"/>
<rect x="548" y="101" width="30" height="189" fill="#2ea043"/>
<text x="529" y="312" text-anchor="middle" font-size="12" fill="#1f2328">总分</text>

<!-- 图例 -->
<g font-size="12" fill="#57606a">
<rect x="205" y="332" width="12" height="12" fill="#8b949e"/><text x="222" y="342">X_pca（未校正）</text>
<rect x="340" y="332" width="12" height="12" fill="#2f6feb"/><text x="357" y="342">scVI</text>
<rect x="425" y="332" width="12" height="12" fill="#2ea043"/><text x="442" y="342">scAtlasVAE</text>
</g>
</svg>
