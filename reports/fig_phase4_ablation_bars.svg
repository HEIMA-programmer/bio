<svg width="680" height="340" viewBox="0 0 680 340" role="img" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', Roboto, Arial, sans-serif">
<title>消融实验对比（示意）</title>
<desc>左：潜维度 n_latent=2/10/50 的整合总分，2 明显偏低、10 与 50 接近；右：KL 预热 开/关 的总分，关掉预热明显变差。数值为示意占位。</desc>
<rect x="0" y="0" width="680" height="340" fill="#ffffff"/>
<text x="340" y="24" text-anchor="middle" font-size="15" font-weight="600" fill="#1f2328">消融实验：总分对比（示意，数值为占位）</text>

<!-- 网格与 Y 轴 (1.0=y70, 0.5=y170, 0=y270) -->
<line x1="60" y1="70" x2="640" y2="70" stroke="#eaeef2"/>
<line x1="60" y1="170" x2="640" y2="170" stroke="#eaeef2"/>
<line x1="60" y1="270" x2="640" y2="270" stroke="#d0d7de"/>
<text x="52" y="74" text-anchor="end" font-size="11" fill="#8b949e">1.0</text>
<text x="52" y="174" text-anchor="end" font-size="11" fill="#8b949e">0.5</text>
<text x="52" y="274" text-anchor="end" font-size="11" fill="#8b949e">0</text>

<!-- 左：潜维度 n_latent -->
<rect x="96"  y="126" width="48" height="144" fill="#8b949e"/>
<rect x="164" y="98"  width="48" height="172" fill="#2ea043"/>
<rect x="232" y="100" width="48" height="170" fill="#8b949e"/>
<text x="120" y="120" text-anchor="middle" font-size="11" fill="#57606a">0.72</text>
<text x="188" y="92"  text-anchor="middle" font-size="11" fill="#2ea043">0.86</text>
<text x="256" y="94"  text-anchor="middle" font-size="11" fill="#57606a">0.85</text>
<text x="120" y="286" text-anchor="middle" font-size="12" fill="#1f2328">2</text>
<text x="188" y="286" text-anchor="middle" font-size="12" fill="#1f2328">10</text>
<text x="256" y="286" text-anchor="middle" font-size="12" fill="#1f2328">50</text>
<text x="188" y="308" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1f2328">潜维度 n_latent</text>

<!-- 分隔 -->
<line x1="350" y1="70" x2="350" y2="290" stroke="#eaeef2" stroke-dasharray="4 4"/>

<!-- 右：KL 预热 -->
<rect x="430" y="98"  width="54" height="172" fill="#2ea043"/>
<rect x="516" y="130" width="54" height="140" fill="#cf222e"/>
<text x="457" y="92"  text-anchor="middle" font-size="11" fill="#2ea043">0.86</text>
<text x="543" y="124" text-anchor="middle" font-size="11" fill="#cf222e">0.70</text>
<text x="457" y="286" text-anchor="middle" font-size="12" fill="#1f2328">预热开</text>
<text x="543" y="286" text-anchor="middle" font-size="12" fill="#1f2328">预热关</text>
<text x="500" y="308" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1f2328">KL 预热</text>

<text x="340" y="330" text-anchor="middle" font-size="11" fill="#57606a">绿=作者默认(好)　灰=更差或无必要更好　红=关掉预热→潜空间坍缩、变差</text>
</svg>
