<svg width="720" height="176" viewBox="0 0 720 176" role="img" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', Roboto, Arial, sans-serif">
<title>scAtlasVAE 复现全流程管线</title>
<desc>五个阶段从左到右：阶段1 环境搭建 → 阶段2 整合与评测 → 阶段3 手写 VAE(重点) → 阶段4 消融 → 阶段5 汇总报告。下方标注对应的复现层级 L1/L1/L2/L3。</desc>
<defs>
<marker id="p" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#57606a"/></marker>
</defs>
<rect x="0" y="0" width="720" height="176" fill="#ffffff"/>
<text x="360" y="26" text-anchor="middle" font-size="15" font-weight="600" fill="#1f2328">scAtlasVAE 复现全流程</text>

<!-- 5 个阶段 -->
<g>
<rect x="16"  y="56" width="124" height="70" rx="8" fill="#f6f8fa" stroke="#d0d7de"/>
<text x="78"  y="80" text-anchor="middle" font-size="13" font-weight="600" fill="#1f2328">阶段 1</text>
<text x="78"  y="98" text-anchor="middle" font-size="12" fill="#1f2328">环境搭建</text>
<text x="78"  y="115" text-anchor="middle" font-size="10" fill="#57606a">4060·conda·cu118</text>

<rect x="155" y="56" width="124" height="70" rx="8" fill="#f6f8fa" stroke="#d0d7de"/>
<text x="217" y="80" text-anchor="middle" font-size="13" font-weight="600" fill="#1f2328">阶段 2</text>
<text x="217" y="98" text-anchor="middle" font-size="12" fill="#1f2328">整合 + 评测</text>
<text x="217" y="115" text-anchor="middle" font-size="10" fill="#57606a">UMAP·scib-metrics</text>

<rect x="294" y="56" width="124" height="70" rx="8" fill="#e9f6ec" stroke="#2ea043"/>
<text x="356" y="80" text-anchor="middle" font-size="13" font-weight="600" fill="#1f2328">阶段 3 ★</text>
<text x="356" y="98" text-anchor="middle" font-size="12" fill="#1f2328">手写 VAE</text>
<text x="356" y="115" text-anchor="middle" font-size="10" fill="#57606a">minimal_scatlasvae</text>

<rect x="433" y="56" width="124" height="70" rx="8" fill="#f6f8fa" stroke="#d0d7de"/>
<text x="495" y="80" text-anchor="middle" font-size="13" font-weight="600" fill="#1f2328">阶段 4</text>
<text x="495" y="98" text-anchor="middle" font-size="12" fill="#1f2328">消融</text>
<text x="495" y="115" text-anchor="middle" font-size="10" fill="#57606a">潜维度·KL预热</text>

<rect x="572" y="56" width="124" height="70" rx="8" fill="#f6f8fa" stroke="#d0d7de"/>
<text x="634" y="80" text-anchor="middle" font-size="13" font-weight="600" fill="#1f2328">阶段 5</text>
<text x="634" y="98" text-anchor="middle" font-size="12" fill="#1f2328">汇总报告</text>
<text x="634" y="115" text-anchor="middle" font-size="10" fill="#57606a">组会 · slides</text>
</g>

<!-- 箭头 -->
<line x1="140" y1="91" x2="153" y2="91" stroke="#57606a" stroke-width="1.5" marker-end="url(#p)"/>
<line x1="279" y1="91" x2="292" y2="91" stroke="#57606a" stroke-width="1.5" marker-end="url(#p)"/>
<line x1="418" y1="91" x2="431" y2="91" stroke="#57606a" stroke-width="1.5" marker-end="url(#p)"/>
<line x1="557" y1="91" x2="570" y2="91" stroke="#57606a" stroke-width="1.5" marker-end="url(#p)"/>

<!-- 复现层级标注 -->
<g font-size="11" fill="#8b949e">
<text x="78"  y="150" text-anchor="middle">L1</text>
<text x="217" y="150" text-anchor="middle">L1</text>
<text x="356" y="150" text-anchor="middle" fill="#2ea043" font-weight="600">L2（核心）</text>
<text x="495" y="150" text-anchor="middle">L3</text>
<text x="634" y="150" text-anchor="middle">汇总</text>
</g>
</svg>
